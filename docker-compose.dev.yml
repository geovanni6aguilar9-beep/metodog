services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: metodog
      POSTGRES_PASSWORD: metodog_pass
      POSTGRES_DB: metodog_dev
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      - PORT=4001
      - DATABASE_URL=postgres://metodog:metodog_pass@db:5432/metodog_dev
      - NODE_ENV=development
    ports:
      - "4001:4001"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: npm run dev

volumes:
  db_data:

