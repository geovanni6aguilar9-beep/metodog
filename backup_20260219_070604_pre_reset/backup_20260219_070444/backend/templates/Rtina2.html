<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Rutina MétodoG — Semana, Abdominales, Notas y PDF</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f7f6;
      --card:#ffffff;
      --muted:#6b7280;
      --text:#0f1724;
      --accent:#2b8f74;
      --accent-2:#7fd3b0;
      --accent-3:#1f6b57;
      --soft:#eef6f3;
      --radius:12px;
      --shadow: 0 8px 24px rgba(15,23,36,0.06);
      --max-width:1100px;
    }
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#f7fbfa 0%,var(--bg) 100%);font-family:"Inter",system-ui,Arial;color:var(--text);-webkit-font-smoothing:antialiased}
    .wrap{max-width:var(--max-width);margin:20px auto;padding:20px}
    header{display:flex;align-items:center;gap:16px;margin-bottom:18px}
    .logo{width:72px;height:72px;border-radius:12px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;box-shadow:var(--shadow)}
    header h1{margin:0;font-size:20px}
    header p{margin:4px 0 0 0;color:var(--muted);font-size:13px}

    .top-row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
    .meta-card{background:var(--card);padding:10px;border-radius:10px;box-shadow:var(--shadow);border:1px solid rgba(15,23,36,0.04);display:flex;gap:10px;align-items:center}
    .meta-card input, .meta-card textarea{border:1px solid #e6eef0;padding:8px;border-radius:8px}

    .grid{display:grid;grid-template-columns:1fr 340px;gap:16px}
    .panel{background:transparent}
    .day-card{background:linear-gradient(180deg,var(--card),#fbfffe);border-radius:12px;padding:12px;border:1px solid rgba(15,23,36,0.04);box-shadow:0 8px 20px rgba(15,23,36,0.04);margin-bottom:12px}
    .day-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .day-title{font-size:16px;font-weight:700;color:var(--accent-3)}
    table{width:100%;border-collapse:collapse;font-size:14px}
    thead th{padding:8px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid rgba(15,23,36,0.04)}
    tbody td{padding:8px;border-bottom:1px dashed rgba(15,23,36,0.03)}
    input[type="text"],input[type="number"],textarea{width:100%;padding:8px;border-radius:8px;border:1px solid #e6eef0;background:transparent;color:var(--text);font-family:inherit}
    textarea{min-height:64px;resize:vertical}
    .controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .btn{background:linear-gradient(90deg,var(--accent) 0%,var(--accent-2) 100%);color:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:700;box-shadow:0 8px 18px rgba(43,143,116,0.12)}
    .btn.ghost{background:transparent;border:1px solid rgba(15,23,36,0.06);color:var(--accent-3);font-weight:700}
    .small{font-size:13px;color:var(--muted)}
    .summary{background:var(--card);padding:12px;border-radius:12px;box-shadow:var(--shadow);border:1px solid rgba(15,23,36,0.03)}
    .pdf-hidden{visibility:hidden !important;opacity:0 !important;pointer-events:none !important}
    .avoid-break { page-break-inside: avoid; -webkit-column-break-inside: avoid; break-inside: avoid; }

    .ab-section{display:flex;gap:8px;align-items:center;margin-top:8px}
    .ab-section input{width:100px}
    .notes{margin-top:8px}

    @media print{
      .btn, .controls, .logo, .side { display:none }
      body{background:#fff}
      .wrap{max-width:800px;padding:12mm}
    }
  </style>
</head>
<body>
  <div class="wrap" id="page-root">
    <header>
      <div class="logo" id="logoPreview">MG</div>
      <div style="flex:1">
        <h1>Rutina MétodoG</h1>
        <p>Semana, abdominales, notas y exportación a PDF.</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <input id="logoFile" type="file" accept="image/*" style="display:none" onchange="handleLogo(event)">
        <div style="display:flex;gap:8px">
          <button class="btn ghost" onclick="document.getElementById('logoFile').click()">Subir imagen</button>
          <button class="btn" onclick="saveAsPDF()">Guardar como PDF</button>
        </div>
      </div>
    </header>

    <div class="top-row">
      <div class="meta-card" style="flex:1;flex-direction:column">
        <div style="display:flex;gap:8px">
          <input id="clientName" type="text" placeholder="Nombre del cliente" style="flex:1">
          <input id="coachName" type="text" placeholder="Coach" style="width:160px">
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
          <div class="small">Inicio</div>
          <input id="startDate" type="date" style="width:160px">
          <div class="small">→</div>
          <input id="endDate" type="date" style="width:160px">
          <div style="margin-left:auto" class="small">Objetivo</div>
          <input id="goal" type="text" placeholder="Ej: Hipertrofia" style="width:180px">
        </div>
      </div>

      <div style="width:340px">
        <div class="summary">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div class="small">Volumen total</div>
              <div id="totalVolume" style="font-weight:800;font-size:18px">0 kg</div>
            </div>
            <div>
              <div class="small">Cardio total</div>
              <div id="totalCardio" style="font-weight:800;font-size:18px">0 min</div>
            </div>
          </div>
          <div style="margin-top:10px" class="small">Días con ejercicios: <span id="daysWithExercises">0</span></div>
          <div class="controls" style="margin-top:12px">
            <button class="btn" onclick="recalculateAll()">Recalcular todo</button>
            <button class="btn ghost" onclick="resetRoutine()">Reset rápido</button>
            <button class="btn ghost" onclick="saveRoutine()">Guardar</button>
            <button class="btn ghost" onclick="loadRoutine()">Cargar</button>
          </div>
        </div>
      </div>
    </div>

    <div style="height:8px;border-radius:8px;background:linear-gradient(90deg,var(--accent) 0%, var(--accent-2) 100%);margin:12px 0"></div>

    <div class="grid">
      <main class="panel" id="mainPanel">
        <!-- Days injected here -->
      </main>

      <aside class="side">
        <div class="summary" style="margin-bottom:12px">
          <h4 style="margin:0 0 8px 0">Resumen semanal</h4>
          <div class="small">Volumen total: <strong id="sideVolume">0 kg</strong></div>
          <div class="small">Cardio total: <strong id="sideCardio">0 min</strong></div>
          <div class="small">Días activos: <strong id="sideDays">0</strong></div>
        </div>
        <div class="summary">
          <h4 style="margin:0 0 8px 0">Imagen semanal</h4>
          <div class="small">Imagen única para la semana (se guarda localmente)</div>
          <div style="margin-top:8px">
            <button class="btn ghost" onclick="document.getElementById('logoFile').click()">Subir / Cambiar</button>
            <button class="btn ghost" onclick="removeLogo()">Eliminar imagen</button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- html2pdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>

  <script>
    // ---------- Config ----------
    const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
    const STORAGE_KEY = 'metodog_rutina_v2';
    const state = {}; // state[day] = { rows: [{exercise, sets, reps, weight, cardio}], ab: {exercise, sets, reps, time}, notes: '' }

    function createEmptyExercise() { return { exercise:'', sets:'', reps:'', weight:'', cardio:'' }; }
    function createEmptyAb() { return { exercise:'Crunch', sets:'', reps:'', time:'' }; }
    function escapeHtml(s){ if(s===undefined||s===null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

    // ---------- Build UI ----------
    function buildRoutineUI() {
      const main = document.getElementById('mainPanel');
      main.innerHTML = '';
      DAYS.forEach(day => {
        if (!state[day]) state[day] = { rows: [createEmptyExercise()], ab: createEmptyAb(), notes: '' };

        const card = document.createElement('div');
        card.className = 'day-card avoid-break';
        card.id = 'card-' + day;

        const header = document.createElement('div');
        header.className = 'day-header';
        header.innerHTML = `<div class="day-title">${day}</div>
                            <div style="margin-left:auto" class="small">Resumen: <span id="daySummary-${day}">0 kg / 0 min</span></div>`;

        const table = document.createElement('table');
        table.innerHTML = `<thead><tr>
          <th style="width:36%">Ejercicio</th><th style="width:12%">Series</th><th style="width:12%">Reps</th>
          <th style="width:12%">Peso (kg)</th><th style="width:12%">Cardio (min)</th><th style="width:10%"></th>
        </tr></thead><tbody id="tbody-${day}"></tbody>`;

        const controls = document.createElement('div');
        controls.className = 'controls';
        controls.innerHTML = `<button class="btn" onclick="addExercise('${day}')">Agregar ejercicio</button>
                              <button class="btn ghost" onclick="removeExercise('${day}')">Eliminar última</button>
                              <button class="btn ghost" onclick="clearDay('${day}')">Limpiar día</button>`;

        // Abdominales section
        const abSection = document.createElement('div');
        abSection.className = 'ab-section';
        abSection.innerHTML = `
          <div style="flex:1">
            <label class="small">Abdominales (ejercicio)</label>
            <input id="ab-ex-${day}" type="text" value="${escapeHtml(state[day].ab.exercise)}" placeholder="Ej: Crunch" onchange="setAb('${day}','exercise',this.value)">
          </div>
          <div>
            <label class="small">Series</label>
            <input id="ab-sets-${day}" type="number" value="${escapeHtml(state[day].ab.sets)}" onchange="setAb('${day}','sets',this.value)">
          </div>
          <div>
            <label class="small">Reps</label>
            <input id="ab-reps-${day}" type="number" value="${escapeHtml(state[day].ab.reps)}" onchange="setAb('${day}','reps',this.value)">
          </div>
          <div>
            <label class="small">Tiempo (s)</label>
            <input id="ab-time-${day}" type="number" value="${escapeHtml(state[day].ab.time)}" onchange="setAb('${day}','time',this.value)">
          </div>`;

        // Notes section
        const notesSection = document.createElement('div');
        notesSection.className = 'notes';
        notesSection.innerHTML = `<label class="small">Notas</label>
                                  <textarea id="notes-${day}" placeholder="Anota observaciones, modificaciones o recomendaciones..." onchange="setNotes('${day}',this.value)">${escapeHtml(state[day].notes)}</textarea>`;

        card.appendChild(header);
        card.appendChild(table);
        card.appendChild(controls);
        card.appendChild(abSection);
        card.appendChild(notesSection);

        main.appendChild(card);

        renderRows(day);
      });
      updateAllTotals();
    }

    function renderRow(day, i) {
      const row = state[day].rows[i] || createEmptyExercise();
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><input type="text" value="${escapeHtml(row.exercise)}" onchange="setCell('${day}',${i},'exercise',this.value)"></td>
                      <td><input type="number" value="${escapeHtml(row.sets)}" onchange="setCell('${day}',${i},'sets',this.value)"></td>
                      <td><input type="number" value="${escapeHtml(row.reps)}" onchange="setCell('${day}',${i},'reps',this.value)"></td>
                      <td><input type="number" value="${escapeHtml(row.weight)}" onchange="setCell('${day}',${i},'weight',this.value)"></td>
                      <td><input type="number" value="${escapeHtml(row.cardio)}" onchange="setCell('${day}',${i},'cardio',this.value)"></td>
                      <td><button class="btn ghost" onclick="deleteRow('${day}',${i})">Eliminar</button></td>`;
      return tr;
    }

    function renderRows(day) {
      const tbody = document.getElementById('tbody-' + day);
      if (!tbody) return;
      tbody.innerHTML = '';
      state[day].rows.forEach((_, i) => tbody.appendChild(renderRow(day, i)));
    }

    // ---------- Row ops ----------
    function addExercise(day) {
      if (!state[day]) state[day] = { rows: [createEmptyExercise()], ab: createEmptyAb(), notes: '' };
      state[day].rows.push(createEmptyExercise());
      renderRows(day);
      updateDayTotals(day);
    }
    function removeExercise(day) {
      if (!state[day] || state[day].rows.length <= 1) { alert('Debe quedar al menos una fila.'); return; }
      state[day].rows.pop();
      renderRows(day);
      updateDayTotals(day);
    }
    function deleteRow(day, idx) {
      if (!confirm('Eliminar este ejercicio?')) return;
      if (!state[day]) return;
      state[day].rows.splice(idx,1);
      renderRows(day);
      updateDayTotals(day);
    }
    function clearDay(day) {
      if (!confirm('Limpiar este día?')) return;
      state[day].rows = [createEmptyExercise()];
      state[day].ab = createEmptyAb();
      state[day].notes = '';
      renderRows(day);
      // update ab inputs and notes in DOM if present
      const abEx = document.getElementById('ab-ex-' + day);
      const abSets = document.getElementById('ab-sets-' + day);
      const abReps = document.getElementById('ab-reps-' + day);
      const abTime = document.getElementById('ab-time-' + day);
      const notesEl = document.getElementById('notes-' + day);
      if (abEx) abEx.value = '';
      if (abSets) abSets.value = '';
      if (abReps) abReps.value = '';
      if (abTime) abTime.value = '';
      if (notesEl) notesEl.value = '';
      updateDayTotals(day);
    }
    function setCell(day, idx, key, value) {
      if (!state[day]) return;
      state[day].rows[idx][key] = value;
      updateDayTotals(day);
    }

    // Abdominales and notes setters
    function setAb(day, key, value) {
      if (!state[day]) state[day] = { rows: [createEmptyExercise()], ab: createEmptyAb(), notes: '' };
      state[day].ab[key] = value;
      // Abdominales do not affect volume by default; if you want to include, modify updateDayTotals
    }
    function setNotes(day, text) {
      if (!state[day]) state[day] = { rows: [createEmptyExercise()], ab: createEmptyAb(), notes: '' };
      state[day].notes = text;
    }

    // ---------- Totals ----------
    function updateDayTotals(day) {
      if (!state[day]) return;
      let vol = 0; // sum sets*reps*weight
      let cardio = 0;
      state[day].rows.forEach(r => {
        const sets = parseFloat(r.sets) || 0;
        const reps = parseFloat(r.reps) || 0;
        const weight = parseFloat(r.weight) || 0;
        const c = parseFloat(r.cardio) || 0;
        vol += sets * reps * weight;
        cardio += c;
      });
      // Optionally include abdominal time as cardio (comment/uncomment as desired)
      // const abTime = parseFloat(state[day].ab.time) || 0;
      // cardio += abTime;

      const summaryEl = document.getElementById('daySummary-' + day);
      if (summaryEl) summaryEl.textContent = `${Math.round(vol)} kg / ${Math.round(cardio)} min`;
      updateAllTotals();
    }

    function updateAllTotals(targetRoot = document) {
      let totalVol = 0, totalCardio = 0, daysActive = 0;
      DAYS.forEach(d => {
        const rows = (state[d] && state[d].rows) || [];
        let dayVol = 0, dayCardio = 0;
        rows.forEach(r => {
          const sets = parseFloat(r.sets) || 0;
          const reps = parseFloat(r.reps) || 0;
          const weight = parseFloat(r.weight) || 0;
          const c = parseFloat(r.cardio) || 0;
          dayVol += sets * reps * weight;
          dayCardio += c;
        });
        if (dayVol > 0 || dayCardio > 0) daysActive++;
        totalVol += dayVol;
        totalCardio += dayCardio;
      });

      function safeSet(id, text) {
        try {
          const el = (targetRoot === document) ? document.getElementById(id) : targetRoot.querySelector('#' + id);
          if (el) el.textContent = text;
        } catch (e) {}
      }

      safeSet('totalVolume', Math.round(totalVol) + ' kg');
      safeSet('totalCardio', Math.round(totalCardio) + ' min');
      safeSet('daysWithExercises', daysActive);
      safeSet('sideVolume', Math.round(totalVol) + ' kg');
      safeSet('sideCardio', Math.round(totalCardio) + ' min');
      safeSet('sideDays', daysActive);
    }

    function recalculateAll() {
      DAYS.forEach(d => updateDayTotals(d));
      updateAllTotals();
      alert('Recalculado.');
    }

    function resetRoutine() {
      if (!confirm('Resetear toda la rutina? Se perderán los cambios no guardados.')) return;
      DAYS.forEach(d => state[d] = { rows: [createEmptyExercise()], ab: createEmptyAb(), notes: '' });
      buildRoutineUI();
    }

    // ---------- Save / Load ----------
    function saveRoutine() {
      const payload = {
        meta: {
          client: document.getElementById('clientName').value || '',
          coach: document.getElementById('coachName').value || '',
          start: document.getElementById('startDate').value || '',
          end: document.getElementById('endDate').value || '',
          goal: document.getElementById('goal').value || ''
        },
        days: {}
      };
      DAYS.forEach(d => payload.days[d] = { rows: state[d].rows, ab: state[d].ab, notes: state[d].notes });
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        alert('Rutina guardada localmente.');
      } catch (e) {
        alert('No se pudo guardar.');
      }
    }

    function loadRoutine() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) { alert('No hay rutina guardada.'); return; }
        const payload = JSON.parse(raw);
        if (payload.meta) {
          document.getElementById('clientName').value = payload.meta.client || '';
          document.getElementById('coachName').value = payload.meta.coach || '';
          document.getElementById('startDate').value = payload.meta.start || '';
          document.getElementById('endDate').value = payload.meta.end || '';
          document.getElementById('goal').value = payload.meta.goal || '';
        }
        DAYS.forEach(d => {
          const dayData = (payload.days && payload.days[d]) || null;
          state[d] = {
            rows: (dayData && dayData.rows) || [createEmptyExercise()],
            ab: (dayData && dayData.ab) || createEmptyAb(),
            notes: (dayData && dayData.notes) || ''
          };
        });
        buildRoutineUI();
        DAYS.forEach(d => updateDayTotals(d));
        updateAllTotals();
        alert('Rutina cargada.');
      } catch (e) {
        alert('Error al cargar.');
      }
    }

    // ---------- Logo ----------
    function handleLogo(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) { alert('Selecciona una imagen.'); return; }
      const reader = new FileReader();
      reader.onload = function(ev) {
        const url = ev.target.result;
        const logo = document.getElementById('logoPreview');
        logo.style.backgroundImage = `url(${url})`;
        logo.style.backgroundSize = 'cover';
        logo.style.backgroundPosition = 'center';
        logo.textContent = '';
        try { localStorage.setItem('metodog_rutina_logo', url); } catch(e){}
      };
      reader.readAsDataURL(file);
    }
    function loadLogo() {
      try {
        const url = localStorage.getItem('metodog_rutina_logo');
        if (url) {
          const logo = document.getElementById('logoPreview');
          logo.style.backgroundImage = `url(${url})`;
          logo.style.backgroundSize = 'cover';
          logo.style.backgroundPosition = 'center';
          logo.textContent = '';
        }
      } catch(e){}
    }
    function removeLogo() {
      try { localStorage.removeItem('metodog_rutina_logo'); } catch(e){}
      const logo = document.getElementById('logoPreview');
      logo.style.backgroundImage = '';
      logo.textContent = 'MG';
    }

    // ---------- PDF export ----------
    const pdfOptions = {
      margin: [10, 10, 10, 10],
      filename: (function(){
        const client = document.getElementById('clientName')?.value || 'Rutina';
        const date = new Date().toISOString().slice(0,10);
        const safe = client.replace(/[\\\/:*?"<>|]/g,'').trim().slice(0,60) || 'Rutina';
        return `${safe}_Rutina_${date}.pdf`;
      })(),
      image: { type: 'jpeg', quality: 0.92 },
      html2canvas: { scale: 1.25, useCORS: true, logging: false, allowTaint: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['css', 'legacy'] }
    };

    async function inlineImages(root) {
      const imgs = Array.from(root.querySelectorAll('img'));
      await Promise.all(imgs.map(img => new Promise(resolve => {
        const src = img.getAttribute('src') || '';
        if (!src || src.startsWith('data:')) return resolve();
        const image = new Image();
        image.crossOrigin = 'anonymous';
        image.onload = function() {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = image.naturalWidth;
            canvas.height = image.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(image, 0, 0);
            const dataURL = canvas.toDataURL('image/jpeg', 0.92);
            img.setAttribute('src', dataURL);
          } catch (e) {}
          resolve();
        };
        image.onerror = function() { resolve(); };
        image.src = src;
        setTimeout(resolve, 1500);
      })));
    }

    async function saveAsPDF() {
      const TARGET = document.querySelector('#page-root');
      if (!TARGET) { alert('No se encontró el contenido para exportar.'); return; }

      // Hide interactive UI
      const hideEls = Array.from(document.querySelectorAll('.btn, .controls, .pdf-hide-on-export'));
      hideEls.forEach(el => el.classList.add('pdf-hidden'));

      // Clone and copy inputs
      const clone = TARGET.cloneNode(true);

      // Add header banner with client and dates to avoid truncation
      const client = document.getElementById('clientName')?.value || '';
      const coach = document.getElementById('coachName')?.value || '';
      const start = document.getElementById('startDate')?.value || '';
      const end = document.getElementById('endDate')?.value || '';
      const banner = document.createElement('div');
      banner.style.padding = '8px 12px';
      banner.style.borderBottom = '1px solid #eee';
      banner.style.display = 'flex';
      banner.style.justifyContent = 'space-between';
      banner.style.alignItems = 'center';
      banner.style.flexWrap = 'wrap';
      banner.style.gap = '8px';
      banner.innerHTML = `<div style="font-weight:800;word-break:break-word;max-width:70%">${escapeHtml(client)}${coach ? ' — ' + escapeHtml(coach) : ''}</div>
                          <div style="font-size:12px;color:#666">${start ? escapeHtml(start) : ''}${start && end ? ' → ' : ''}${end ? escapeHtml(end) : ''}</div>`;
      clone.insertBefore(banner, clone.firstChild);

      // Copy input/select/textarea values into clone
      try {
        const originals = TARGET.querySelectorAll('input, textarea, select');
        originals.forEach(orig => {
          let cloneEl = null;
          if (orig.id) cloneEl = clone.querySelector('#' + CSS.escape(orig.id));
          if (!cloneEl && orig.name) cloneEl = clone.querySelector(`[name="${orig.name}"]`);
          if (!cloneEl) {
            const candidates = Array.from(clone.querySelectorAll(orig.tagName.toLowerCase()));
            for (let c of candidates) {
              if (!c._matched) { cloneEl = c; c._matched = true; break; }
            }
          }
          if (!cloneEl) return;
          const tag = orig.tagName.toLowerCase();
          if (tag === 'input') {
            const type = (orig.getAttribute('type') || '').toLowerCase();
            if (type === 'checkbox' || type === 'radio') cloneEl.checked = orig.checked;
            else { cloneEl.value = orig.value; cloneEl.setAttribute('value', orig.value); }
          } else if (tag === 'textarea') { cloneEl.value = orig.value; cloneEl.textContent = orig.value; }
          else if (tag === 'select') cloneEl.value = orig.value;
        });
      } catch (e) { console.warn('No se pudieron copiar todos los valores al clon', e); }

      // Place clone off-screen and set width to A4 px to preserve layout
      const wrapper = document.createElement('div');
      wrapper.style.position = 'fixed';
      wrapper.style.left = '-9999px';
      wrapper.style.top = '0';
      const a4px = 794;
      clone.style.width = a4px + 'px';
      clone.style.maxWidth = 'none';
      clone.style.boxSizing = 'border-box';
      clone.style.background = '#fff';
      wrapper.appendChild(clone);
      document.body.appendChild(wrapper);

      try {
        await inlineImages(clone);
        if (typeof updateAllTotals === 'function') updateAllTotals(clone);
        await new Promise(r => setTimeout(r, 400));
        await html2pdf().set(pdfOptions).from(clone).save();
      } catch (err) {
        console.error('Error generando PDF:', err);
        alert('Ocurrió un error al generar el PDF. Revisa la consola para más detalles.');
      } finally {
        hideEls.forEach(el => el.classList.remove('pdf-hidden'));
        if (wrapper && wrapper.parentNode) wrapper.parentNode.removeChild(wrapper);
      }
    }

    // ---------- Init ----------
    (function init(){
      DAYS.forEach(d => state[d] = { rows: [createEmptyExercise()], ab: createEmptyAb(), notes: '' });
      buildRoutineUI();
      loadLogo();
      setInterval(() => { DAYS.forEach(d => updateDayTotals(d)); updateAllTotals(); }, 700);
    })();
  </script>
</body>
</html>
